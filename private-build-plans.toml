[buildPlans.Iosevka]
family = "Iosevka"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.Iosevka.variants.design]
one = "base"
two = "straight-neck-serifless"
six = "open-contour"
eight = "two-circles"
nine = "open-contour"
zero = "oval-slashed"
capital-m = "slanted-sides-hanging-serifless"
capital-q = "detached-tailed"
f = "flat-hook-serifless-crossbar-at-x-height"
t = "flat-hook-short-neck"
question = "corner"
lig-ltgteq = "slanted"

[buildPlans.Iosevka.variants.italic]
one = "base"
two = "straight-neck-serifless"
six = "open-contour"
eight = "two-circles"
nine = "open-contour"
zero = "oval-slashed"
capital-m = "slanted-sides-hanging-serifless"
capital-q = "detached-tailed"
f = "flat-hook-tailed-crossbar-at-x-height"
t = "flat-hook-short-neck"
question = "corner"
lig-ltgteq = "slanted"

[buildPlans.Iosevka.ligations]
inherits = "javascript"

[buildPlans.Iosevka.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Iosevka.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.Iosevka.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Iosevka.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"